<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Github</title>
</head>
<body>
    <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Github_logo_svg.svg/960px-Github_logo_svg.svg.png?_=20230420150203" alt="github" width="48px" height="48px" />
    
    <h1 class="ttl txt">Sign in to GitHub</h1>
    
    <div class="form-cont">
        
        <p class="txt label">Username or email address</p>
        <input class="usr txt" type="text" value="12" />
        
        <div class="password-row">
            <span class="txt pass-lbl">Password</span><a class="forgot-lbl" href="https://github.com/password_reset">Forgot password?</a>
        </div>
        <input class="usr txt" type="password"/>
        
        <input type="button" class="logbtn txt" value="Sign in" />
        
        <p class="txt dvd">----------------------------- or -----------------------------</p>
        
        <button class="oauth txt">
            <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/960px-Google_%22G%22_logo.svg.png" alt="Google" width="20px" height="20px" /> Continue with Google 
        </button>
        
        <button class="oauth txt">
            <img class="icon" src="https://logos-world.net/wp-content/uploads/2020/04/Apple-Logo.png" alt="Apple" width="20px" height="20px" /> Continue with Apple 
        </button>
        
        <p class="txt footer-text">New to GitHub? <a class="link" href="https://github.com/signup">Create an account</a></p>
        
        <p class="footer-text"><a class="link" href="https://github.com">Sign in with a passkey</a></p>
    </div>
</body>
</html>
